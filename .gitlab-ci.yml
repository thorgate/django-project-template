# Official docker image.
image: docker:latest

services:
    - docker:dind

variables:
    DOCKER_DRIVER: overlay
    DOCKER_BUILDKIT: "1"

before_script:
    - docker login -u "$CI_REGISTRY_USER" -p "$CI_REGISTRY_PASSWORD" $CI_REGISTRY
    - apk update
    - apk upgrade
    # As CI docker image is based on alpine and we generate lock file outside of docker
    # We need system libraries required for pip dependencies
    - apk add python3 python3-dev build-base libffi-dev openssl-dev git postgresql-dev bash
    - python3 -m ensurepip
    - pip3 install -U pip pipenv==2020.6.2 setuptools wheel
    - pipenv install --system --ignore-pipfile --dev
    - git config --global user.email "foo@bar.baz"
    - git config --global user.name "Foo Bar"
    # See the following issue for reasoning: https://gitlab.com/gitlab-org/gitlab-ce/issues/41227
    - export SHARED_PATH="$(dirname ${CI_PROJECT_DIR})/shared"
    - export TPL_PLAYGROUND="${SHARED_PATH}/tpl-playground"
    - mkdir -p $TPL_PLAYGROUND

stages:
    #- test
    # Since CI image publish job only runs from protected branches then new changes to CI
    #  docker image must be introduced separately from other features. We could move it
    #  to be the first stage but that would only work for changes merged into master/spa.
    #
    # Note: When you do it consider that:
    # - publish-ci-image.sh always tags the image as latest
    # - might need to run publish_ci_image for all branchess
    - publish_ci_image

publish_ci_image:
    stage: publish_ci_image
    only:
        - master
        - spa
        - publish_ci_image # TODO: Temporary
    script:
        - ./utils/publish-ci-image.sh ci Dockerfile-ci

publish_base_ci_image:
    stage: publish_ci_image
    only:
        - publish_ci_image # TODO: Temporary (will be changed to schedules)
    script:
        - ./utils/publish-ci-image.sh base-ci Dockerfile-base-ci
